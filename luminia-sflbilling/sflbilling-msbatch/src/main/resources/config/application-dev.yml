logging:
  level:
    ROOT: DEBUG
    org.hibernate.SQL: OFF
    bo.com.luminia.sflbilling.msbatch: DEBUG

spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/sflbilling
    username: postgres
    password: 123456
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    database-platform: bo.com.luminia.sflbilling.msbatch.config.dbplatform.FixedPostgreSQL10Dialect
  liquibase:
    # Remove 'faker' if you do not want the sample data to be loaded automatically
    contexts: dev, faker
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false

server:
  port: 8084

coreprop:
  # CORS is only enabled by default with the "dev" profile
  cors:
    allowed-origins: '*'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,X-Total-Count'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: NjkzYjg2MjBlN2IzNjNlZDEyOGNkNGZlMzQyMTJlYTMyOTgyNDk2NmM4YTUxNzZkYWI2ZWU3MzYxYjcxYjNkNzI4YjIzOWY1YjUyZTNiMTI5YmRiNzJjYmQ5NDM2OTcyN2JiNzUyOWI3YTQxMWU0Y2RjMWEzZjliNTdjZWIyNDI=
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000

