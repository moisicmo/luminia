jib {
    from {
        image = "eclipse-temurin:8-jre-focal"
    }
    to {
        image = "ghcr.io/luminia-bo/sflbilling-msreport:${version}"
        tags = ["latest"]
    }
    container {
        entrypoint = ["/entrypoint.sh"]
        ports = ["8083"]
        environment = [
            SPRING_OUTPUT_ANSI_ENABLED: "ALWAYS",
            APP_SLEEP                 : "0"
        ]
        creationTime = "USE_CURRENT_TIMESTAMP"
    }
    extraDirectories {
        paths = ["src/main/docker/jib"]
        permissions = ["/entrypoint.sh": "755"]
    }
}
